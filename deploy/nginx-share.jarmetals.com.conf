# Reference copy of production vhost (live server: /etc/nginx/sites-enabled/share.jarmetals.com)
# LiveKit /rtc uses resolver + variable proxy_pass so DNS is not required at nginx startup.

server {
    listen 80;
    listen [::]:80;
    server_name share.jarmetals.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name share.jarmetals.com;

    ssl_certificate /etc/letsencrypt/live/share.jarmetals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/share.jarmetals.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/share-app/livekit-app/frontend;
    index index.html;

    # Cache-busting for HTML
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Long cache for assets (they have hashes in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy for LiveKit — runtime DNS (not at startup) so apt/systemd reexec cannot brick nginx
    location /rtc {
        resolver 127.0.0.53 8.8.8.8 valid=30s ipv6=off;
        resolver_timeout 5s;
        set $livekit_upstream "production-uiycx4ku.livekit.cloud";
        proxy_pass https://$livekit_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host production-uiycx4ku.livekit.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
