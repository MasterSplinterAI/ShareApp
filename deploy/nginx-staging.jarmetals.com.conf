# Staging vhost for staging.jarmetals.com (reference + deploy target).
# Live server: /etc/nginx/sites-enabled/staging.jarmetals.com (or equivalent).
# HTML must not be cached so SPA picks up new hashed JS/CSS after each deploy.

server {
    server_name staging.jarmetals.com;

    root /var/www/share-app-staging/livekit-app/frontend;
    index index.html;

    # Long cache for hashed build assets (Vite outputs content-hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location /api {
        proxy_pass http://localhost:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /rtc {
        resolver 127.0.0.53 8.8.8.8 valid=30s ipv6=off;
        resolver_timeout 5s;
        set $livekit_upstream "production-uiycx4ku.livekit.cloud";
        proxy_pass https://$livekit_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host production-uiycx4ku.livekit.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/staging.jarmetals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.jarmetals.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = staging.jarmetals.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name staging.jarmetals.com;
    return 404;
}
